<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BRUNA - Tarjeta de Fidelización</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#35251A">
    <link rel="apple-touch-icon" href="icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-warm: #F8F4E6;
            --card-white: #FDFAF0;
            --brand-dark: #35251A;
            --brand-gradient: linear-gradient(135deg, #3A2A1E 0%, #1A110A 100%);
            --brand-light: #F2E3A4;
            --text-main: #35251A;
            --text-secondary: #8C7A6B;
            --border-warm: #E6DED5;
            
            --cup-empty-border: rgba(242, 227, 164, 0.25);
            --cup-filled-coffee: #35251A;
            --cup-filled-steam: #FFFFFF;
            --cup-marked-bg: #F2E3A4;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-warm);
            margin: 0; padding: 20px;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; color: var(--text-main);
            touch-action: manipulation;
        }

        /* --- PANTALLAS --- */
        #pantallaRegistro, #pantallaTarjeta, #cargando {
            width: 100%;
            max-width: 360px;
            box-sizing: border-box;
        }

        #pantallaRegistro {
            text-align: center; display: none;
            background-color: var(--card-white); padding: 40px 30px;
            border-radius: 28px; box-shadow: 0 10px 30px rgba(53, 37, 26, 0.08);
            border: 1px solid rgba(230, 222, 213, 0.5);
        }

        #pantallaRegistro h2 { font-family: 'Lilita One', cursive; color: var(--brand-dark); margin-top: 0; font-size: 32px; letter-spacing: 1px;}
        
        .input-group { margin-bottom: 15px; text-align: left;}
        .input-group label { font-size: 12px; color: var(--text-secondary); font-weight: 600; margin-left: 5px; display: block; margin-bottom: 5px;}
        
        .input-box {
            width: 100%; padding: 18px; border-radius: 14px; border: 1.5px solid var(--border-warm);
            font-size: 16px; box-sizing: border-box; font-family: 'Poppins', sans-serif;
            background-color: #FFFDF7; transition: border-color 0.2s;
        }
        .input-box:focus { border-color: var(--brand-dark); outline: none; background-color: #fff;}
        
        .btn-crear {
            background: var(--brand-gradient); color: var(--brand-light); border: none;
            padding: 18px; width: 100%; border-radius: 18px; font-size: 16px;
            font-weight: 600; cursor: pointer; margin-top: 20px;
            box-shadow: 0 8px 20px rgba(53, 37, 26, 0.25); transition: transform 0.1s;
        }
        .btn-crear:active { transform: scale(0.97); }

        /* --- TARJETA --- */
        #pantallaTarjeta { display: none; }
        .flip-container { perspective: 1000px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .flip-container.flipped .flipper { transform: rotateY(180deg); }
        .flipper { display: grid; transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-style: preserve-3d; }
        .front, .back { grid-area: 1 / 1; backface-visibility: hidden; border-radius: 28px; height: 480px; }
        .front { transform: rotateY(0deg); }
        .back {
            transform: rotateY(180deg); 
            background: url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='15' y='45' font-family='sans-serif' font-weight='bold' font-size='35' fill='%23F2E3A4' fill-opacity='0.04'%3EB%3C/text%3E%3C/g%3E%3C/svg%3E"), var(--brand-gradient);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .wallet-card {
            background: var(--brand-gradient); border-radius: 28px; height: 100%;
            display: flex; flex-direction: column; color: var(--brand-light);
            padding: 25px; box-sizing: border-box; border: 1px solid rgba(242, 227, 164, 0.1);
        }

        .stamps-container {
            background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 20px; 
            border: 1px solid rgba(242, 227, 164, 0.15); margin-bottom: 20px;
        }
        .stamps-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; justify-items: center;}
        
        /* --- TAZAS --- */
        .stamp-cup { width: 40px; height: 40px; transition: all 0.3s ease; }
        .stamp-cup .cup-path { fill: none; stroke: var(--cup-empty-border); stroke-width: 1.5; }
        .stamp-cup .coffee-fill { fill: none; opacity: 0; }
        .stamp-cup.filled .cup-path { fill: var(--cup-marked-bg); stroke: var(--cup-marked-bg); }
        .stamp-cup.filled .coffee-fill { fill: var(--cup-filled-coffee); opacity: 1; }

        .qr-box { background-color: var(--brand-light); padding: 10px; border-radius: 16px; margin: 0 auto; width: 120px; }
        .qr-box img { width: 100%; display: block; mix-blend-mode: multiply; }

        /* --- MODAL --- */
        .custom-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(53, 37, 26, 0.6); backdrop-filter: blur(4px);
            z-index: 3000; display: none; align-items: center; justify-content: center;
        }
        .custom-modal-box {
            background: var(--card-white); border-radius: 24px; padding: 30px;
            width: 90%; max-width: 320px; text-align: center;
        }
        .btn-modal-ok { width: 100%; background: var(--brand-dark); color: var(--brand-light); border: none; padding: 14px; border-radius: 16px; cursor: pointer; font-weight: 600; }

        .btn-cerrar { background: none; color: var(--text-secondary); border: none; width: 100%; text-decoration: underline; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="modalAlertaCustom" class="custom-modal-overlay">
        <div class="custom-modal-box">
            <div id="textoAlertaCustom" style="margin-bottom: 20px; font-weight: 600;">Mensaje</div>
            <button id="btnCerrarAlerta" class="btn-modal-ok">Entendido</button>
        </div>
    </div>

    <div id="cargando" style="text-align: center; font-weight: 600; color: var(--text-secondary);">Cargando Bruna...</div>

    <div id="pantallaRegistro">
        <h2>BRUNA</h2>
        <p>Obtén tu tarjeta de fidelización digital.</p>
        <div class="input-group">
            <label>Nombre / Apodo</label>
            <input type="text" id="inputNombre" class="input-box" placeholder="Ej: Simon">
        </div>
        <div class="input-group">
            <label>WhatsApp</label>
            <input type="tel" id="inputCelular" class="input-box" placeholder="Ej: 2215551234">
        </div>
        <button class="btn-crear" id="btnCrearTarjeta">Entrar a mi Tarjeta</button>
    </div>

    <div id="pantallaTarjeta">
        <p style="text-align: center; font-size: 12px; color: var(--text-secondary); margin-bottom: 10px;">Toca la tarjeta para girar</p>
        <div class="flip-container" onclick="this.classList.toggle('flipped')">
            <div class="flipper">
                <div class="front">
                    <div class="wallet-card">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                            <div style="font-family: 'Lilita One'; font-size: 24px;">BRUNA</div>
                            <div style="text-align: right;">
                                <div id="displayNombre" style="font-weight: 700;">...</div>
                                <div id="displayTelLabel" style="font-size: 10px; opacity: 0.7;">******</div>
                            </div>
                        </div>
                        <div class="stamps-container">
                            <div class="stamps-grid" id="gridSellos"></div>
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                            <div>
                                <div style="font-size: 10px; opacity: 0.7;">PREMIO</div>
                                <div id="displayPremio" style="font-size: 14px; font-weight: 700;">Buscando...</div>
                            </div>
                            <div style="text-align: right;">
                                <div style="font-size: 10px; opacity: 0.7;">TAZAS</div>
                                <div style="font-size: 18px; font-weight: 700;"><span id="displayPuntos">0</span>/10</div>
                            </div>
                        </div>
                        <div class="qr-box"><img id="qrImage" src="" alt="QR"></div>
                    </div>
                </div>
                <div class="back">
                    <div style="background: var(--brand-light); width: 150px; height: 150px; border-radius: 50%; display: flex; justify-content: center; align-items: center;">
                        <h2 style="font-family: 'Lilita One'; color: var(--brand-dark); font-size: 35px; margin: 0;">BRUNA</h2>
                    </div>
                </div>
            </div>
        </div>
        <button id="btnCerrarSesion" class="btn-cerrar">Cerrar sesión</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCaqJraAXeZ8F4zCd9GUIdNIHhfU7FMzJk",
            authDomain: "club-cafe-app.firebaseapp.com",
            projectId: "club-cafe-app",
            storageBucket: "club-cafe-app.firebasestorage.app",
            messagingSenderId: "1007849307452",
            appId: "1:1007849307452:web:2472f6b2cab7deeae53239"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        class BrunaUI {
            constructor() {
                this.init();
            }

            async init() {
                const tel = localStorage.getItem('miTarjetaCafeTEL');
                if (tel) {
                    this.cargarTarjeta(tel);
                } else {
                    this.mostrarPantalla('registro');
                }

                document.getElementById('btnCrearTarjeta').onclick = () => this.procesarIngreso();
                document.getElementById('btnCerrarSesion').onclick = () => this.logout();
                document.getElementById('btnCerrarAlerta').onclick = () => document.getElementById('modalAlertaCustom').style.display = 'none';
            }

            mostrarPantalla(p) {
                document.getElementById('cargando').style.display = p === 'cargando' ? 'block' : 'none';
                document.getElementById('pantallaRegistro').style.display = p === 'registro' ? 'block' : 'none';
                document.getElementById('pantallaTarjeta').style.display = p === 'tarjeta' ? 'block' : 'none';
            }

            alerta(m) {
                document.getElementById('textoAlertaCustom').innerText = m;
                document.getElementById('modalAlertaCustom').style.display = 'flex';
            }

            async procesarIngreso() {
                const nombreRaw = document.getElementById('inputNombre').value.trim();
                let tel = document.getElementById('inputCelular').value.replace(/\D/g, '');

                if (!nombreRaw || tel.length < 8) return this.alerta("Datos incompletos.");

                const nombre = nombreRaw.charAt(0).toUpperCase() + nombreRaw.slice(1).toLowerCase();
                this.mostrarPantalla('cargando');

                try {
                    const docRef = doc(db, "clientes", tel);
                    const docSnap = await getDoc(docRef);

                    if (!docSnap.exists()) {
                        await setDoc(docRef, { nombre, puntos: 0, fecha: new Date().toISOString() });
                    } else {
                        await setDoc(docRef, { nombre }, { merge: true });
                    }

                    localStorage.setItem('miTarjetaCafeTEL', tel);
                    this.cargarTarjeta(tel);
                } catch (e) {
                    this.alerta("Error al conectar con Firebase. Revisa las reglas de seguridad.");
                    this.mostrarPantalla('registro');
                }
            }

            cargarTarjeta(tel) {
                this.mostrarPantalla('tarjeta');
                document.getElementById('qrImage').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${tel}&bgcolor=F2E3A4&color=35251A`;
                document.getElementById('displayTelLabel').innerText = `******${tel.slice(-4)}`;

                onSnapshot(doc(db, "clientes", tel), (snap) => {
                    if (snap.exists()) {
                        const d = snap.data();
                        document.getElementById('displayNombre').innerText = d.nombre;
                        document.getElementById('displayPuntos').innerText = d.puntos;
                        this.dibujarTazas(d.puntos);
                        document.getElementById('displayPremio').innerText = d.puntos >= 10 ? "¡LISTO! 🎁" : "Faltan " + (10 - d.puntos);
                    }
                });
            }

            dibujarTazas(pts) {
                const grid = document.getElementById('gridSellos');
                grid.innerHTML = '';
                for (let i = 1; i <= 10; i++) {
                    const cup = document.createElement('div');
                    cup.innerHTML = `<svg class="stamp-cup ${i <= pts ? 'filled' : ''}" viewBox="0 0 100 100"><path class="cup-path" d="M20,35 H80 V75 Q80,90 65,90 H35 Q20,90 20,75 Z" /><path class="coffee-fill" d="M22,37 H78 V73 Q78,88 63,88 H37 Q22,88 22,73 Z" /></svg>`;
                    grid.appendChild(cup.firstChild);
                }
            }

            logout() {
                localStorage.clear();
                location.reload();
            }
        }

        window.onload = () => new BrunaUI();
    </script>
</body>
</html>
